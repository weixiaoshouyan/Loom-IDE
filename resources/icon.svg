<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="loomGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#007acc"/>
      <stop offset="100%" stop-color="#4ec9b0"/>
    </linearGradient>
    <linearGradient id="loomGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4ec9b0"/>
      <stop offset="100%" stop-color="#007acc"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="256" height="256" rx="48" fill="url(#bg)"/>
  
  <!-- Outer ring -->
  <circle cx="128" cy="128" r="104" fill="none" stroke="url(#loomGrad)" stroke-width="3" opacity="0.4"/>
  <circle cx="128" cy="128" r="96" fill="none" stroke="url(#loomGrad)" stroke-width="2" opacity="0.3"/>
  
  <!-- Web lines - angular geometric pattern -->
  <!-- Horizontal threads -->
  <line x1="48" y1="64" x2="208" y2="64" stroke="url(#loomGrad)" stroke-width="1.5" opacity="0.3"/>
  <line x1="48" y1="96" x2="208" y2="96" stroke="url(#loomGrad)" stroke-width="1.5" opacity="0.3"/>
  <line x1="48" y1="128" x2="208" y2="128" stroke="url(#loomGrad)" stroke-width="2" opacity="0.4"/>
  <line x1="48" y1="160" x2="208" y2="160" stroke="url(#loomGrad)" stroke-width="1.5" opacity="0.3"/>
  <line x1="48" y1="192" x2="208" y2="192" stroke="url(#loomGrad)" stroke-width="1.5" opacity="0.3"/>
  
  <!-- Diagonal threads (weaving pattern) -->
  <line x1="64" y1="48" x2="192" y2="208" stroke="url(#loomGrad2)" stroke-width="1" opacity="0.25"/>
  <line x1="80" y1="48" x2="208" y2="192" stroke="url(#loomGrad2)" stroke-width="1" opacity="0.25"/>
  <line x1="48" y1="80" x2="192" y2="208" stroke="url(#loomGrad2)" stroke-width="1" opacity="0.25"/>
  <line x1="48" y1="64" x2="176" y2="208" stroke="url(#loomGrad2)" stroke-width="1" opacity="0.25"/>
  
  <!-- Opposite diagonal -->
  <line x1="64" y1="208" x2="192" y2="48" stroke="url(#loomGrad2)" stroke-width="1" opacity="0.2"/>
  <line x1="48" y1="176" x2="176" y2="48" stroke="url(#loomGrad2)" stroke-width="1" opacity="0.2"/>
  <line x1="80" y1="208" x2="208" y2="64" stroke="url(#loomGrad2)" stroke-width="1" opacity="0.2"/>
  
  <!-- Main "L" shape - bold geometric -->
  <path d="M72 52 L72 200 L168 200" fill="none" stroke="url(#loomGrad)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Inner weaving accent on the L -->
  <path d="M96 72 L96 176 L148 176" fill="none" stroke="url(#loomGrad2)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
  
  <!-- Connector dots at grid intersections -->
  <circle cx="128" cy="128" r="6" fill="#4ec9b0" opacity="0.9"/>
  <circle cx="72" cy="128" r="3" fill="#007acc" opacity="0.6"/>
  <circle cx="184" cy="128" r="3" fill="#007acc" opacity="0.6"/>
  <circle cx="128" cy="72" r="3" fill="#4ec9b0" opacity="0.5"/>
  <circle cx="128" cy="184" r="3" fill="#4ec9b0" opacity="0.5"/>
  
  <!-- Small sparkle dots -->
  <circle cx="168" cy="88" r="2" fill="#4ec9b0" opacity="0.4"/>
  <circle cx="88" cy="168" r="2" fill="#4ec9b0" opacity="0.4"/>
  <circle cx="160" cy="140" r="2" fill="#007acc" opacity="0.3"/>
  <circle cx="100" cy="100" r="2" fill="#007acc" opacity="0.3"/>
</svg>

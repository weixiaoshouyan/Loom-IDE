<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Create Loom Icon</title>
<style>
  body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background: #1e1e1e; color: #ccc; }
  canvas { border: 2px solid #333; border-radius: 8px; margin: 10px; }
  button { padding: 10px 20px; margin: 5px; cursor: pointer; background: #007acc; color: white; border: none; border-radius: 4px; font-size: 14px; }
  button:hover { background: #1c97ea; }
  .sizes { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
</style>
</head>
<body>
<h2>Loom IDE Icon Generator</h2>
<p>点击下方按钮下载对应尺寸的图标 PNG</p>
<div class="sizes" id="buttons"></div>
<script>
function drawIcon(size) {
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');
  const s = size;

  // Background gradient
  const bgGrad = ctx.createLinearGradient(0, 0, s, s);
  bgGrad.addColorStop(0, '#1a1a2e');
  bgGrad.addColorStop(1, '#16213e');
  ctx.beginPath();
  ctx.roundRect(0, 0, s, s, s * 0.18);
  ctx.fillStyle = bgGrad;
  ctx.fill();

  // Outer rings
  const cx = s / 2, cy = s / 2;
  const r1 = s * 0.41, r2 = s * 0.375;
  ctx.beginPath();
  ctx.arc(cx, cy, r1, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(0,122,204,0.35)';
  ctx.lineWidth = s * 0.012;
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(cx, cy, r2, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(0,122,204,0.25)';
  ctx.lineWidth = s * 0.008;
  ctx.stroke();

  // Web grid lines
  ctx.strokeStyle = 'rgba(78,201,176,0.2)';
  ctx.lineWidth = s * 0.004;
  const step = s * 0.125;
  for (let y = s * 0.25; y <= s * 0.75; y += step) {
    ctx.beginPath();
    ctx.moveTo(s * 0.2, y);
    ctx.lineTo(s * 0.8, y);
    ctx.stroke();
  }

  // Diagonal web lines
  ctx.strokeStyle = 'rgba(78,201,176,0.15)';
  ctx.lineWidth = s * 0.003;
  for (let i = 0; i < 4; i++) {
    const off = i * s * 0.06;
    ctx.beginPath();
    ctx.moveTo(s * 0.2 + off, s * 0.2);
    ctx.lineTo(s * 0.8, s * 0.8 - off);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(s * 0.2, s * 0.8 - off);
    ctx.lineTo(s * 0.8 - off, s * 0.2);
    ctx.stroke();
  }

  // Main L shape
  const gradL = ctx.createLinearGradient(0, s, s, 0);
  gradL.addColorStop(0, '#007acc');
  gradL.addColorStop(1, '#4ec9b0');
  ctx.strokeStyle = gradL;
  ctx.lineWidth = s * 0.047;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(s * 0.28, s * 0.2);
  ctx.lineTo(s * 0.28, s * 0.78);
  ctx.lineTo(s * 0.66, s * 0.78);
  ctx.stroke();

  // Inner L accent
  ctx.strokeStyle = 'rgba(78,201,176,0.5)';
  ctx.lineWidth = s * 0.016;
  ctx.beginPath();
  ctx.moveTo(s * 0.37, s * 0.28);
  ctx.lineTo(s * 0.37, s * 0.69);
  ctx.lineTo(s * 0.58, s * 0.69);
  ctx.stroke();

  // Center node
  ctx.fillStyle = '#4ec9b0';
  ctx.globalAlpha = 0.9;
  ctx.beginPath();
  ctx.arc(cx, cy, s * 0.024, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  // Small nodes
  const nodes = [
    [s * 0.28, cy], [s * 0.72, cy], [cx, s * 0.28], [cx, s * 0.72]
  ];
  nodes.forEach(([nx, ny]) => {
    ctx.fillStyle = '#007acc';
    ctx.globalAlpha = 0.5;
    ctx.beginPath();
    ctx.arc(nx, ny, s * 0.012, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  });

  return canvas;
}

const sizes = [
  { label: '256x256 (icon.png)', size: 256 },
  { label: '512x512 (icon.png)', size: 512 },
  { label: '1024x1024', size: 1024 },
  { label: '48x48 (small)', size: 48 },
  { label: '32x32 (tiny)', size: 32 },
  { label: '16x16 (favicon)', size: 16 },
];

const buttonsDiv = document.getElementById('buttons');

sizes.forEach(({ label, size }) => {
  const canvas = drawIcon(size);
  const btn = document.createElement('button');
  btn.textContent = `Download ${label}`;
  btn.onclick = () => {
    const link = document.createElement('a');
    link.download = `icon-${size}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  };
  buttonsDiv.appendChild(btn);
  document.body.appendChild(canvas);
});

// Auto-download the 256px version for the app icon
setTimeout(() => {
  const canvas = drawIcon(256);
  const link = document.createElement('a');
  link.download = 'icon.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}, 500);
</script>
</body>
</html>
